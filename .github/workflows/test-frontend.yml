name: Frontend tests

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/test-frontend.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - 'backend/**'

jobs:
  unit:
    name: Unit tests + lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test:run

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kanban
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      # Backend env
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kanban
      JWT_ACCESS_SECRET: ci_access_secret_at_least_thirty_two_chars_long
      JWT_REFRESH_SECRET: ci_refresh_secret_at_least_thirty_two_chars_long
      ALLOWED_ORIGINS: http://localhost:4173
      FRONTEND_URL: http://localhost:4173
      NODE_ENV: test
      PORT: 3000
      # Frontend env (used at build time)
      VITE_API_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # -----------------------------------------------------------
      # Backend: install, migrate DB, build, start in background
      # -----------------------------------------------------------
      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Prisma generate + migrate
        working-directory: backend
        run: |
          npx prisma generate
          npx prisma migrate deploy

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Start backend (background)
        working-directory: backend
        run: |
          nohup node dist/main.js > backend.log 2>&1 &
          echo "BACKEND_PID=$!" >> $GITHUB_ENV

      - name: Wait for backend to be ready
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:3000/health > /dev/null; then
              echo "✓ Backend is ready"
              exit 0
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done
          echo "✗ Backend did not start in time"
          cat backend/backend.log || true
          exit 1

      # -----------------------------------------------------------
      # Frontend: install, build, serve via Vite preview
      # -----------------------------------------------------------
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        # --with-deps installs system libs for headless browsers on Ubuntu
        run: npx playwright install --with-deps chromium webkit

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Start frontend preview (background)
        working-directory: frontend
        run: |
          nohup npx vite preview --port 4173 --host 0.0.0.0 > frontend.log 2>&1 &
          echo "FRONTEND_PID=$!" >> $GITHUB_ENV

      - name: Wait for frontend to be ready
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:4173/ > /dev/null; then
              echo "✓ Frontend is ready"
              exit 0
            fi
            echo "Waiting for frontend... ($i/30)"
            sleep 2
          done
          echo "✗ Frontend did not start in time"
          cat frontend/frontend.log || true
          exit 1

      # -----------------------------------------------------------
      # Run all Playwright projects (desktop + mobile + tablet + responsive)
      # -----------------------------------------------------------
      - name: Run Playwright tests
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:4173
          CI: true
        run: npm run test:e2e

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

      - name: Upload Playwright traces / screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: frontend/test-results/
          retention-days: 14

      - name: Upload backend log if failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: backend/backend.log
          retention-days: 7
